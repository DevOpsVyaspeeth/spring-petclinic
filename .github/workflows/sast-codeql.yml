name: "SAST - CodeQL Analysis"

on:
  # push:
  #   branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  # schedule:
  #   - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: write

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'python', 'java', 'csharp', 'go' ]
        # CodeQL supports: 'cpp', 'csharp', 'go', 'java', 'javascript', 'python', 'ruby', 'swift'
        # Learn more: https://aka.ms/codeql-docs/language-support

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        queries: security-extended
        # Use security-extended for comprehensive security coverage
        # Alternative options: security-and-quality, security-only

    # Autobuild attempts to build compiled languages (Java, C#, C++, Go)
    # Uncomment to use autobuild instead of custom build steps below
    # - name: Autobuild
    #   uses: github/codeql-action/autobuild@v3
    #   if: matrix.language == 'java' || matrix.language == 'csharp' || matrix.language == 'go'

    # For Java projects with custom build steps (Mule, Tibco), customize as needed:
    - name: Build Java Projects
      if: matrix.language == 'java'
      run: |
        # For Maven projects
        if [ -f "pom.xml" ]; then
          # mvn clean install -DskipTests
          ./mvnw -B verify
        # For Gradle projects
        elif [ -f "gradlew" ]; then
          ./gradlew clean build -x test
        elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
          gradle clean build -x test
        fi
        # Add custom build commands for Mule/Tibco if needed

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      id: analyze
      with:
        category: "/language:${{ matrix.language }}"
        upload: true

    - name: Get CodeQL Results
      if: always() && github.event_name == 'pull_request'
      id: get-sarif
      run: |
        # Download SARIF results for comment generation
        echo "Analysis complete for ${{ matrix.language }}"
        echo "results_available=true" >> $GITHUB_OUTPUT

  post-pr-comment:
    name: Post SAST Results to PR
    runs-on: ubuntu-latest
    needs: analyze
    if: always() && github.event_name == 'pull_request'
    
    steps:
    - name: Post PR Comment with SAST Results
      uses: actions/github-script@v7
      with:
        script: |
          const languages = ['javascript', 'python', 'java', 'csharp', 'go'];
          
          let comment = '## 🔒 SAST (Static Application Security Testing) Results\n\n';
          comment += '### CodeQL Analysis Summary\n\n';
          
          // Check workflow conclusion
          const runId = context.runId;
          const { data: workflowRun } = await github.rest.actions.getWorkflowRun({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: runId
          });
          
          // Get code scanning alerts for this PR
          let alerts = [];
          try {
            const { data: codeScanning } = await github.rest.codeScanning.listAlertsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            alerts = codeScanning;
          } catch (error) {
            console.log('Could not fetch code scanning alerts:', error.message);
          }
          
          if (alerts.length === 0) {
            comment += '### ✅ No Security Issues Detected\n\n';
            comment += 'CodeQL analysis completed successfully with no security vulnerabilities found.\n\n';
          } else {
            comment += '### ⚠️ Security Issues Detected\n\n';
            
            // Group by severity
            const critical = alerts.filter(a => a.rule.severity === 'error');
            const high = alerts.filter(a => a.rule.severity === 'warning');
            const medium = alerts.filter(a => a.rule.severity === 'note');
            
            comment += '| Severity | Count |\n';
            comment += '|----------|-------|\n';
            comment += `| 🔴 Critical/High | ${critical.length} |\n`;
            comment += `| 🟡 Medium | ${high.length} |\n`;
            comment += `| 🔵 Low/Info | ${medium.length} |\n\n`;
            
            // Show top 5 issues
            if (alerts.length > 0) {
              comment += '#### Top Issues:\n\n';
              alerts.slice(0, 5).forEach((alert, index) => {
                comment += `${index + 1}. **${alert.rule.description}** (${alert.rule.severity})\n`;
                comment += `   - Location: \`${alert.most_recent_instance.location.path}\`\n`;
                comment += `   - [View Details](${alert.html_url})\n\n`;
              });
            }
          }
          
          comment += '#### 📊 Scan Details\n';
          comment += `- **Languages Analyzed**: ${languages.join(', ')}\n`;
          comment += '- **Query Suite**: security-extended\n';
          comment += `- **Workflow**: [View Full Results](${context.payload.repository.html_url}/actions/runs/${context.runId})\n`;
          comment += `- **Security Tab**: [View All Alerts](${context.payload.repository.html_url}/security/code-scanning)\n\n`;
          
          comment += '#### 📚 Resources\n';
          comment += '- [CodeQL Documentation](https://docs.github.com/en/code-security/code-scanning/introduction-to-code-scanning/about-code-scanning-with-codeql)\n';
          comment += '- [CodeQL Query Reference](https://codeql.github.com/codeql-query-help/)\n\n';
          comment += '---\n';
          comment += '*🤖 Automated SAST scan powered by GitHub CodeQL*';
          
          // Post or update comment
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const botComment = comments.find(comment => 
            comment.user.type === 'Bot' && 
            comment.body.includes('SAST (Static Application Security Testing) Results')
          );
          
          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: comment
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
          }
