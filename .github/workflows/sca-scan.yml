name: "SCA - Dependency Review"

on:
  # push:
  #   branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly scan on Sunday
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  dependency-review:
    name: SCA Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Dependency Review
      uses: actions/dependency-review-action@v4
      id: dependency-review
      continue-on-error: true  # Don't fail if Dependency Graph is not enabled
      with:
        fail-on-severity: high
        # License checking: Use either allow-licenses OR deny-licenses, not both
        # allow-licenses: MIT, Apache-2.0, BSD-3-Clause, BSD-2-Clause, ISC
        deny-licenses: GPL-3.0, AGPL-3.0
        comment-summary-in-pr: always
        retry-on-snapshot-warnings: true  # Retry if snapshots not found
        warn-only: true  # Don't fail on warnings, only on actual vulnerabilities
        
    - name: Post PR Comment with SCA Results
      if: always() && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          
          // Read dependency review results if available
          let comment = '## 🔍 SCA (Software Composition Analysis) Results\n\n';
          
          if ('${{ steps.dependency-review.outcome }}' === 'failure') {
            comment += '### ⚠️ Vulnerable Dependencies Detected\n\n';
            comment += 'This PR introduces dependencies with known vulnerabilities.\n\n';
            comment += '**Action Required**: Review the dependency changes and update to secure versions.\n\n';
          } else if ('${{ steps.dependency-review.outcome }}' === 'success') {
            comment += '### ✅ No Vulnerable Dependencies Detected\n\n';
            comment += 'All dependencies in this PR are free from known high/critical vulnerabilities.\n\n';
          }
          
          comment += '#### 📊 Scan Details\n';
          comment += '- **Severity Threshold**: HIGH and above\n';
          comment += '- **Status**: `${{ steps.dependency-review.outcome }}`\n';
          comment += '- **Workflow**: [View Full Results](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n';
          comment += '#### 📚 Resources\n';
          comment += '- [Dependency Review Documentation](https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/about-dependency-review)\n';
          comment += '- [GitHub Advisory Database](https://github.com/advisories)\n\n';
          comment += '---\n';
          comment += '*💡 Tip: Enable Dependabot for automated security updates*';
          
          // Post or update comment
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          
          const botComment = comments.find(comment => 
            comment.user.type === 'Bot' && 
            comment.body.includes('SCA (Software Composition Analysis) Results')
          );
          
          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: comment
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
          }

  dependency-scan-push:
    name: Dependency Scan (Push)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run SBOM Generation
      uses: anchore/sbom-action@v0
      with:
        format: spdx-json
        output-file: sbom.spdx.json

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.spdx.json
        retention-days: 30

    - name: Scan SBOM for vulnerabilities
      uses: anchore/scan-action@v3
      id: scan
      continue-on-error: true
      with:
        sbom: sbom.spdx.json
        fail-build: false
        severity-cutoff: high
        output-format: sarif

    - name: Upload vulnerability report
      uses: github/codeql-action/upload-sarif@v3
      if: always() && steps.scan.outputs.sarif != ''
      with:
        sarif_file: ${{ steps.scan.outputs.sarif }}
        category: dependency-scan
